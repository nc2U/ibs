name: Database Backup (Manual)

on:
  # CNPG ScheduledBackup이 매일 자동으로 S3 백업을 수행합니다.
  # 이 워크플로우는 긴급 수동 백업이 필요할 때만 사용합니다.
  # schedule:
  #   - cron: "0 */8 * * *"  # CNPG S3 자동 백업으로 대체되어 비활성화

  workflow_dispatch:
    inputs:
      backup_name:
        description: '백업 식별 이름 (예: pre-deploy, emergency)'
        required: false
        default: 'manual'

jobs:
  backup:
    name: Manual CNPG Backup
    runs-on: ubuntu-latest

    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        uses: garygrossgarten/github-action-ssh@release
        with:
          host: ${{ secrets.CICD_HOST }}
          username: ${{ secrets.CICD_USER }}
          password: ${{ secrets.CICD_PASS }}
          command: |
            export KUBECONFIG=$HOME/.kube/config

            BACKUP_NAME="manual-${{ github.event.inputs.backup_name }}-$(date +%Y%m%d-%H%M%S)"

            echo "🚀 Triggering CNPG manual backup: ${BACKUP_NAME}"

            kubectl create -f - <<EOF
            apiVersion: postgresql.cnpg.io/v1
            kind: Backup
            metadata:
              name: ${BACKUP_NAME}
              namespace: ibs-prod
            spec:
              method: barmanObjectStore
              cluster:
                name: postgres
            EOF

            echo "⏳ Waiting for backup to complete..."
            sleep 10

            # 백업 상태 확인
            kubectl get backup ${BACKUP_NAME} -n ibs-prod -o jsonpath='{.status.phase}'
            BACKUP_STATUS=$(kubectl get backup ${BACKUP_NAME} -n ibs-prod -o jsonpath='{.status.phase}')

            if [ "$BACKUP_STATUS" = "completed" ]; then
              echo "✅ Backup completed successfully: ${BACKUP_NAME}"
            else
              echo "⏳ Backup is running (status: ${BACKUP_STATUS}). Check with:"
              echo "   kubectl get backup ${BACKUP_NAME} -n ibs-prod"
            fi

      - name: Send slack when failed
        if: ${{ failure() }}
        uses: ./.github/actions/slack-notify
        with:
          slack_incoming_url: ${{ secrets.SLACK_INCOMING_URL }}
