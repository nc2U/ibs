{{- if and .Values.erpRedirect .Values.erpRedirect.enabled -}}
{{- $fullName := include "hibs.fullname" . | lower -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-erp-redirect
  labels:
    {{- include "hibs.labels" . | nindent 4 }}
  annotations:
    # 기존 어노테이션 방식 유지
    {{- if .Values.nginx.ingress.className }}
    kubernetes.io/ingress.class: {{ .Values.nginx.ingress.className | quote }}
    {{- else }}
    kubernetes.io/ingress.class: "nginx"
    {{- end }}
    # 변수 없이 도메인만 적어도 경로는 자동으로 유지됩니다.
    nginx.ingress.kubernetes.io/permanent-redirect: https://ibs.dyibs.com
spec:
  # 최신 방식의 IngressClassName 추가
  {{- if and .Values.nginx.ingress.className (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion) }}
  ingressClassName: {{ .Values.nginx.ingress.className }}
  {{- end }}
  {{- if .Values.nginx.ingress.tls }}
  tls:
    - hosts:
        - erp.dyibs.com
      secretName: {{ (index .Values.nginx.ingress.tls 0).secretName }}
  {{- end }}
  rules:
    - host: erp.dyibs.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-%s" .Release.Name "nginx" | trunc 63 | trimSuffix "-" }}
                port:
                  number: {{ .Values.nginx.service.port }}
{{- end }}
