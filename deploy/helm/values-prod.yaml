# Production values override for CNPG (Mock Backup Config)
cnpg:
  enabled: true
  backup:
    enabled: true
    s3:
      enabled: true
      bucket: "postgres-backup-prod-mock"
      region: "ap-northeast-2"
      endpoint: "http://192.168.0.200:9000"
      accessKeyId: "YOUR_PROD_ACCESS_KEY"
      secretAccessKey: "YOUR_PROD_SECRET_KEY"