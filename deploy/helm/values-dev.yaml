# Development values override for CNPG (Mock Backup Config)
cnpg:
  enabled: true
  backup:
    enabled: true
    s3:
      enabled: true
      bucket: "postgres-backup-dev-mock"
      region: "ap-northeast-2"
      endpoint: "http://192.168.0.100:9000"
      accessKeyId: "YOUR_DEV_ACCESS_KEY"
      secretAccessKey: "YOUR_DEV_SECRET_KEY"